<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Love ❤️</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <style>
        /* 기본 배경 설정: 화면 꽉 차게 정중앙 정렬 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 배경은 검은색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 하트와 텍스트를 감싸는 컨테이너 */
        .heart-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        /* 클릭(터치) 시 살짝 커지는 효과 */
        .heart-wrapper:active {
            transform: scale(1.1);
        }

        /* SVG 하트 스타일 */
        svg {
            width: 100%;
            height: 100%;
            fill: #ff3366;
            filter: drop-shadow(0 0 15px rgba(255, 51, 102, 0.6));
        }

        /* 하트 위에 올라갈 텍스트 */
        .text-content {
            position: absolute;
            top: 45%; /* 하트의 약간 위쪽 중앙 */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            color: white;
            pointer-events: none; /* 텍스트가 클릭을 방해하지 않도록 함 */
        }

        /* 이름 스타일 수정: 더 잘 보이게! */
.name {
    display: block;
    margin-top: 10px;
    font-size: 1.2rem;          /* 크기를 살짝 키웠어요 */
    color: #ffff00;             /* 밝은 노란색으로 변경 (흰색을 원하시면 white로 적어주세요) */
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); /* 검은색 그림자로 글씨를 선명하게 */
}

/* 메인 타이틀(For My...)도 더 잘 보이게 수정 */
h1 {
    font-size: 1.4rem;
    margin: 0;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
}

        /* 하단 숨겨진 메시지 */
        #message {
            position: absolute;
            bottom: 15%;
            color: white;
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .show-message {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="heart-wrapper" onclick="startEvent()">
        <svg viewBox="0 0 32 29.6">
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>

        <div class="text-content">
            <h1>For My<br>One and Only</h1>
            <span class="name">Xuan 돼지 ❤️</span>
        </div>
    </div>

    <div id="message">내 곁에 있어줘서 항상 고마워!</div>

    <script>
        function startEvent() {
            // 메시지 서서히 나타나게 하기
            document.getElementById('message').classList.add('show-message');
            
            // 하트 색상 변경 효과
            document.querySelector('svg').style.fill = '#ff6699';
        }
    </script>
</body>
</html>
